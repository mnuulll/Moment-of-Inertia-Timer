<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perbandingan Momen Inersia</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 20px; }
    h1 { text-align: center; }
    .container { max-width: 1200px; margin: auto; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .card { background: #1e2937; padding: 20px; border-radius: 16px; text-align: center; }
    .chart-container { background: #1e2937; padding: 20px; border-radius: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Perbandingan Momen Inersia</h1>
    <p style="text-align:center; color:#94a3b8;">Silinder vs Bola</p>

    <div class="cards">
      <div class="card">
        <h3>I Silinder</h3>
        <p id="i_silinder" style="font-size:2rem; color:#22c55e;">0.000000 kg·m²</p>
      </div>
      <div class="card">
        <h3>I Bola</h3>
        <p id="i_bola" style="font-size:2rem; color:#a855f7;">0.000000 kg·m²</p>
      </div>
      <div class="card">
        <h3>Perbedaan</h3>
        <p id="perbedaan" style="font-size:1.8rem;">0.00 %</p>
      </div>
    </div>

    <div class="chart-container">
      <h2 style="text-align:center;">Grafik Perbandingan Momen Inersia</h2>
      <canvas id="comparisonChart" height="140"></canvas>
    </div>
  </div>

  <script>
    const channelID = "MASUKKAN_CHANNEL_ID_KAMU";      // GANTI
    const readAPIKey = "MASUKKAN_READ_API_KEY_KAMU";  // GANTI

    let chart;

    async function updateData() {
      const url = `https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readAPIKey}&results=50`;
      const res = await fetch(url);
      const data = await res.json();

      let silinderData = [];
      let bolaData = [];
      let labels = [];

      data.feeds.forEach(feed => {
        const jenis = parseInt(feed.field5);
        const i_eks = parseFloat(feed.field3);

        labels.push(new Date(feed.created_at).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}));

        if (jenis === 0) silinderData.push(i_eks);
        else if (jenis === 1) bolaData.push(i_eks);
      });

      // Update Card
      document.getElementById('i_silinder').textContent = silinderData[silinderData.length-1] ? silinderData[silinderData.length-1].toFixed(6) + " kg·m²" : "—";
      document.getElementById('i_bola').textContent = bolaData[bolaData.length-1] ? bolaData[bolaData.length-1].toFixed(6) + " kg·m²" : "—";

      // Update Chart
      if (chart) {
        chart.data.labels = labels;
        chart.data.datasets[0].data = silinderData;
        chart.data.datasets[1].data = bolaData;
        chart.update();
      }
    }

    function initChart() {
      const ctx = document.getElementById('comparisonChart');
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: [],
          datasets: [
            { label: 'Silinder Padat', borderColor: '#22c55e', data: [], borderWidth: 3, tension: 0.4 },
            { label: 'Bola Padat', borderColor: '#a855f7', data: [], borderWidth: 3, tension: 0.4 }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { position: 'top' } },
          scales: { y: { beginAtZero: true, title: { display: true, text: 'Momen Inersia (kg·m²)' } } }
        }
      });
    }

    window.onload = () => {
      initChart();
      updateData();
      setInterval(updateData, 6000);   // Update setiap 6 detik
    };
  </script>
</body>
</html>
