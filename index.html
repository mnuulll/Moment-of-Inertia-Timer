<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IoT Moment of Inertia Timer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 20px; }
    .container { max-width: 1100px; margin: auto; }
    h1 { text-align: center; color: white; }
    .control-panel {
      background: #1e2937;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
      justify-content: center;
    }
    select, button {
      padding: 12px 20px;
      font-size: 1.1rem;
      border-radius: 12px;
      border: none;
    }
    select { background: #334155; color: white; }
    button {
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #16a34a; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
    .card { background: #1e2937; padding: 20px; border-radius: 16px; text-align: center; }
    .card h3 { margin: 0; color: #94a3b8; }
    .card p { font-size: 2rem; margin: 8px 0 0 0; font-weight: 600; }
    canvas { max-height: 400px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>IoT Moment of Inertia Timer</h1>

    <!-- Control Panel -->
    <div class="control-panel">
      <select id="jenisBenda">
        <option value="0">Silinder Padat</option>
        <option value="1">Bola Padat</option>
      </select>
      <button onclick="kirimPilihan()">🔄 Kirim Pilihan & Mulai Tes</button>
      <button onclick="refreshData()">Refresh Data</button>
    </div>

    <div class="cards">
      <div class="card"><h3>Waktu</h3><p id="waktu">0.00 s</p></div>
      <div class="card"><h3>Kecepatan</h3><p id="kecepatan">0.00 m/s</p></div>
      <div class="card"><h3>I Eksperimen</h3><p id="i_eks">0.000000 kg·m²</p></div>
      <div class="card"><h3>Error</h3><p id="error">0.00 %</p></div>
    </div>

    <div style="margin-top:30px;">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <script>
    const channelID = "MASUKKAN_CHANNEL_ID_KAMU";
    const writeAPIKey = "MASUKKAN_WRITE_API_KEY_KAMU";   // Untuk kirim pilihan
    const readAPIKey = "MASUKKAN_READ_API_KEY_KAMU";

    let chart;

    async function kirimPilihan() {
      const jenis = document.getElementById('jenisBenda').value;
      const url = `https://api.thingspeak.com/update?api_key=${writeAPIKey}&field5=${jenis}`;
      await fetch(url);
      alert("Pilihan jenis benda telah dikirim ke ESP32!");
    }

    async function refreshData() {
      const url = `https://api.thingspeak.com/channels/${channelID}/feeds/last.json?api_key=${readAPIKey}`;
      const res = await fetch(url);
      const data = await res.json();

      document.getElementById('waktu').textContent = parseFloat(data.field1 || 0).toFixed(3) + " s";
      document.getElementById('kecepatan').textContent = parseFloat(data.field2 || 0).toFixed(3) + " m/s";
      document.getElementById('i_eks').textContent = parseFloat(data.field3 || 0).toFixed(6) + " kg·m²";
      document.getElementById('error').textContent = parseFloat(data.field6 || 0).toFixed(2) + " %";
    }

    // Inisialisasi Chart
    function initChart() {
      const ctx = document.getElementById('chart');
      chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [
          { label: 'I Eksperimen', borderColor: '#22c55e', data: [] },
          { label: 'I Teoretis', borderColor: '#a855f7', data: [] }
        ]},
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
      });
    }

    window.onload = () => {
      initChart();
      refreshData();
      setInterval(refreshData, 5000);   // Auto refresh setiap 5 detik
    };
  </script>
</body>
</html>
